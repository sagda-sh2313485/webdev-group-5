<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="../css/style.css" />
    <title>Feed</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
  </head>
  <body>
    <main class="feed-main">  
        <h1>Feed</h1>
      <!--Whats on your mind? section-->
      <section class="whats-on-your-mind">
          <div class="create-post" id ='create-post'>
            <!--top row-->
              <div class="top-row">
                <img src="../assets/images/default.jpg" alt="profile" class="avatar" id = 'pfp'>
                <textarea class="mind-input" id="mind-input" placeholder="What's on your mind?"></textarea>
              </div>
              <img id="post-preview" class="post-image" style="display: none;">
              <!--bottom row-->
              <div class="bottom-row">
                <div class="image-icon">
                  <input type="file" id="imageUpload" accept="image/*" hidden> <!--so when the user clicks on the icon it loaads-->
                  <i class="fa-regular fa-image" id ='image-icon'></i>
                  
                </div>
                <button class="post-btn" id ='post-btn'>Post</button>
              </div>
          </div>
      </section>
      <!--post cards-->  <!--Feed of posts-->
      <section class="posts-feed" id = 'posts-feed'>
    </section>
     <!-- bottom navigation -->
     <nav class="bottom-nav">
        <a href="feed.html" class="nav-item active">
          <i class="fa-solid fa-house"></i>
          <span>Feed</span>
        </a>

        <a href="explore.html" class="nav-item">
          <i class="fa-regular fa-compass"></i>
          <span>Explore</span>
        </a>

        <a href="../profile/profile.html" class="nav-item">
          <i class="fa-regular fa-user"></i>
          <span>Profile</span>
        </a>
    </nav>
    <script src="../utils/storage.js"></script>
    <script src="../utils/feedUtils.js"></script>
    <script src="../feed/feed.js"></script>
    <script src="../post/post.js"></script>
    </main>
  </body>
</html>
